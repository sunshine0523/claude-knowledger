default_search_mode: auto
runtime_registry_path: ~/.knowledger/registry.json
server:
  address: ":34125"
knowledge_bases:
  - id: default
    name: Default
    store_type: sqlite
    enabled: true
    store_config:
      path: ~/.knowledger/db
    indexing:
      lexical:
        enabled: true
      semantic:
        enabled: true
        provider: chroma
        mode: persistent
        path: ~/.knowledger/chroma/default
        collection: default
        auto_download: true
        sync_mode: async

  # Optional explicit text knowledge base example. Text KBs require a path.
  - id: docs
    name: Docs
    store_type: text
    enabled: false
    store_config:
      path: ./data/docs
