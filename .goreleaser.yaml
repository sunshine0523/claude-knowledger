version: 2

builds:
  - main: ./cmd/knowledger
    binary: knowledger
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:']
